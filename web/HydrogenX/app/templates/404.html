{% extends "base.html" %}
{% block title %}页面不存在 · {{ APP_BRAND }}{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 24px;">
  <div style="text-align:center;max-width:400px;">
    <div style="font-size:5rem;font-weight:900;color:var(--bg-4);line-height:1;margin-bottom:16px;">404</div>
    <h2 style="font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:10px;">页面不存在</h2>
    <p style="color:var(--text-2);font-size:0.9rem;margin-bottom:28px;">你访问的页面不存在或已被移除。</p>
    <a href="{{ url_for('dashboard.home') }}" class="btn-primary-dark" style="display:inline-flex;">
      <i class="bi bi-arrow-left"></i> 返回首页
    </a>
  </div>
</div>
{% endblock %}
